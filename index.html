    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;

      padding: 3rem 2rem;

    .container {

      display: inline-block;
      margin-right: 1.5rem;

    .question {
      margin-bottom: 2rem;
    }

    .question h3 {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .question p {
      font-size: 0.95rem;
      color: #444;
      font-style: italic;
      border-left: 3px solid #ccc;
      padding-left: 1rem;
      line-height: 1.6;

    footer {
      border-top: 1px solid #ddd;
